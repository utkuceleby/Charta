name: Release

# Publishes the NuGet package when a version tag is pushed (e.g. v1.0.0).
# Requires a NUGET_API_KEY repository secret. The tag must match the <Version> in Charta.csproj.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux font packages (font-discovery tests)
        run: sudo apt-get update && sudo apt-get install -y fontconfig fonts-dejavu-core

      # Gate the release on a green test run so a broken build can never reach NuGet.
      - name: Test
        run: dotnet test -c Release

      - name: Verify the tag matches the core package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Charta/Charta.csproj)
          echo "tag=$TAG_VERSION package=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match <Version> $PKG_VERSION in Charta.csproj."
            exit 1
          fi

      # Pack every publishable package (core + add-ons). --skip-duplicate lets an add-on whose
      # version did not change be re-run harmlessly.
      - name: Pack
        run: |
          dotnet pack src/Charta -c Release -o artifacts
          dotnet pack src/Charta.Shaping.HarfBuzz -c Release -o artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --skip-duplicate
